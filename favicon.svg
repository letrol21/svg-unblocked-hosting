<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
    <defs>
        <!-- Background Gradient -->
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0f172a" />
            <stop offset="100%" stop-color="#1e293b" />
        </linearGradient>
        
        <!-- Icon Glow/Gradient -->
        <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#10b981" />
            <stop offset="100%" stop-color="#3b82f6" />
        </linearGradient>

        <!-- Subtle Drop Shadow for the Icon -->
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#10b981" flood-opacity="0.3" />
        </filter>
    </defs>

    <!-- Rounded Background Layer -->
    <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />

    <!-- Outer Border Ring -->
    <rect width="480" height="480" x="16" y="16" rx="112" fill="none" stroke="url(#iconGrad)" stroke-width="4" opacity="0.3" />

    <!-- Central Icon (Cloud + Code Bracket Mashup) -->
    <g filter="url(#glow)">
        <path d="M400 288a72 72 0 0 0-72-72 71.4 71.4 0 0 0-16.2 1.8A104 104 0 0 0 216 136a103.3 103.3 0 0 0-54.3 15.3 88 88 0 0 0-49.7 78.4c0 2 .2 4 .5 6A64 64 0 0 0 128 360h256a80 80 0 0 0 16-72z" 
              fill="none" 
              stroke="url(#iconGrad)" 
              stroke-width="28" 
              stroke-linecap="round" 
              stroke-linejoin="round" />
              
        <!-- Inner Code Symbol Element (/>) -->
        <path d="M220 290l-30 30 30 30M292 290l30 30-30 30M268 280l-24 50" 
              fill="none" 
              stroke="url(#iconGrad)" 
              stroke-width="24" 
              stroke-linecap="round" 
              stroke-linejoin="round" />
    </g>
</svg>
