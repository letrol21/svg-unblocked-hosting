<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG Unblocked Hosting</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-1: #10b981; 
            --accent-2: #3b82f6;
            --border-color: rgba(255, 255, 255, 0.1);
            --glow: 0 0 20px rgba(16, 185, 129, 0.4);
        }

        html, body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            margin-top: 0;
            margin-bottom: 10px;
            background: linear-gradient(to right, var(--accent-1), var(--accent-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: var(--glow);
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .wizard-container {
            text-align: center;
            padding: 10px 0 20px 0;
            animation: fadeIn 0.4s ease forwards;
        }
        
        .wizard-container h2 {
            color: var(--text-main);
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 1.5rem;
        }
        
        .wizard-container p {
            color: var(--text-muted);
            margin-bottom: 25px;
            font-size: 1.1rem;
        }
        
        .wizard-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        
        .wizard-buttons button {
            width: 120px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            padding: 12px 20px;
            border-radius: 8px;
            color: var(--text-main);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .wizard-buttons button:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-2);
            transform: translateY(-2px);
        }

        #main-app { display: none; }

        .form-group {
            margin-bottom: 24px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        label {
            display: block;
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input[type="text"], input[type="password"], textarea {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 14px;
            border-radius: 8px;
            font-size: 1rem;
            font-family: monospace;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        textarea {
            resize: vertical;
            min-height: 180px;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-1);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.2);
        }

        .input-with-button {
            display: flex;
            gap: 10px;
        }

        .btn-inline {
            white-space: nowrap;
            width: auto;
            padding: 0 16px;
            font-size: 0.85rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            border-radius: 8px;
        }

        .btn-inline:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--accent-2);
        }

        .input-with-extension {
            display: flex;
            align-items: center;
        }

        .input-with-extension input {
            border-top-right-radius: 0;
            border-bottom-right-radius: 0;
            border-right: none;
        }

        .input-with-extension .extension {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-left: none;
            padding: 14px 20px;
            border-top-right-radius: 8px;
            border-bottom-right-radius: 8px;
            color: var(--text-muted);
            font-weight: bold;
        }

        .action-buttons {
            margin-top: 30px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        button {
            width: 100%;
            padding: 18px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: white;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .btn-deploy {
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-deploy:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.5);
        }

        .btn-generate {
            background: linear-gradient(135deg, var(--accent-2), #8b5cf6);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-generate:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.5);
        }

        .btn-download {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: var(--text-main);
        }

        .btn-download:hover:not(:disabled) {
            transform: translateY(-2px);
            border-color: var(--accent-2);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.15);
        }

        .status-log {
            font-family: monospace;
            color: var(--accent-1);
            font-size: 0.95rem;
            text-align: center;
            min-height: 24px;
            margin-top: 10px;
        }

        .links-panel {
            margin-top: 30px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            display: none;
            animation: fadeIn 0.5s ease forwards;
        }

        .links-panel h3 {
            margin-top: 0;
            margin-bottom: 16px;
            font-size: 1.2rem;
            color: var(--accent-1);
        }

        .link-row {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 10px 14px;
            border-radius: 6px;
            margin-bottom: 12px;
        }

        .link-url {
            flex-grow: 1;
            font-family: monospace;
            font-size: 0.9rem;
            color: var(--text-main);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .btn-copy {
            width: auto;
            padding: 6px 12px;
            font-size: 0.8rem;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            letter-spacing: 0;
        }

        .btn-copy:hover {
            background: var(--accent-2);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .form-row { grid-template-columns: 1fr; gap: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>SVG Unblocked Hosting</h1>
        <div class="subtitle" id="main-subtitle">Setup Deployment Context</div>

        <div id="step-1" class="wizard-container">
            <h2>Do you have an existing GitHub repository?</h2>
            <div class="wizard-buttons">
                <button onclick="handleQ1(true)">Yes</button>
                <button onclick="handleQ1(false)">No</button>
            </div>
        </div>

        <div id="step-2" class="wizard-container" style="display: none;">
            <h2>Do you have an HTML file in that repo?</h2>
            <div class="wizard-buttons">
                <button onclick="handleQ2(true)">Yes</button>
                <button onclick="handleQ2(false)">No</button>
            </div>
        </div>

        <div id="main-app">
            
            <div class="form-group" id="group-html">
                <label for="htmlInput">Paste your HTML here</label>
                <textarea id="htmlInput" placeholder="<!DOCTYPE html>&#10;<html>&#10;<body>&#10;  <h1>Hello World!</h1>&#10;</body>&#10;</html>"></textarea>
            </div>

            <div class="form-row">
                <div class="form-group" id="group-username" style="display:none;">
                    <label for="gitUsername">GitHub Username</label>
                    <input type="text" id="gitUsername" placeholder="e.g. octocat">
                </div>

                <div class="form-group" id="group-repo">
                    <label for="gitRepo" id="label-repo">New Repository Name</label>
                    <input type="text" id="gitRepo" placeholder="new-site" value="new-site">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group" id="group-filename">
                    <label for="fileName">Name of your HTML file</label>
                    <div class="input-with-extension">
                        <input type="text" id="fileName" placeholder="index" value="index">
                        <div class="extension">.html</div>
                    </div>
                </div>

                <div class="form-group" id="group-token">
                    <label for="gitToken">GitHub Personal Access Token</label>
                    <div class="input-with-button">
                        <input type="password" id="gitToken" placeholder="ghp_xxxxxxxxxxxxxxxxx">
                        <button class="btn-inline" type="button" onclick="redirectToTokenGenerator()">Get Token</button>
                    </div>
                </div>
            </div>

            <div class="action-buttons">
                <button class="btn-deploy" id="deployBtn" onclick="createRepoAndDeploy()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
                    Create Repo & Deploy
                </button>
                <button class="btn-generate" id="generateBtn" onclick="generateOnly()" style="display:none;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
                    Generate Links & Download SVG
                </button>
                <button class="btn-download" id="downloadBtn" onclick="downloadZip()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    Download Files as ZIP
                </button>
            </div>

            <div id="statusLog" class="status-log"></div>

            <div id="linksPanel" class="links-panel">
                <h3>Hosted CDN Links</h3>
                <div id="linksList"></div>
            </div>
        </div>
    </div>

    <script>
        let globalUsername = "";
        let currentAppMode = "NO_REPO";


        function handleQ1(hasRepo) {
            document.getElementById('step-1').style.display = 'none';
            if (hasRepo) {
                document.getElementById('step-2').style.display = 'block';
            } else {
                setupUI('NO_REPO');
            }
        }

        function handleQ2(hasHtml) {
            document.getElementById('step-2').style.display = 'none';
            if (hasHtml) {
                setupUI('HAS_REPO_HAS_HTML');
            } else {
                setupUI('HAS_REPO_NO_HTML');
            }
        }

        function setupUI(mode) {
            currentAppMode = mode;
            document.getElementById('main-app').style.display = 'block';

            const gHtml = document.getElementById('group-html');
            const gUser = document.getElementById('group-username');
            const gRepo = document.getElementById('group-repo');
            const gFile = document.getElementById('group-filename');
            const gToken = document.getElementById('group-token');

            const btnDeploy = document.getElementById('deployBtn');
            const btnGenerate = document.getElementById('generateBtn');
            const btnDownload = document.getElementById('downloadBtn');
            const subtitle = document.getElementById('main-subtitle');

            if (mode === 'NO_REPO') {
                subtitle.innerText = "Deploy a new site directly to GitHub";
                
                gUser.style.display = 'none';
                gHtml.style.display = 'block';
                gFile.style.display = 'block';
                gToken.style.display = 'block';
                
                document.getElementById('label-repo').innerText = "New Repository Name";
                
                btnDeploy.style.display = 'flex';
                btnGenerate.style.display = 'none';
                btnDownload.style.display = 'none';
            }
            else if (mode === 'HAS_REPO_NO_HTML') {
                subtitle.innerText = "Prepare files for an existing repository";
                
                gUser.style.display = 'block';
                gHtml.style.display = 'block';
                gFile.style.display = 'none';
                gToken.style.display = 'none';
                
                document.getElementById('label-repo').innerText = "Existing Repository Name";
                document.getElementById('gitRepo').value = "";
                
                btnDeploy.style.display = 'none'; 
                btnGenerate.style.display = 'none';
                btnDownload.style.display = 'flex';
            }
            else if (mode === 'HAS_REPO_HAS_HTML') {
                subtitle.innerText = "Generate unblocked links for an existing file";
                
                gUser.style.display = 'block';
                gHtml.style.display = 'none';
                gFile.style.display = 'block';
                gToken.style.display = 'none';
                
                document.getElementById('label-repo').innerText = "Existing Repository Name";
                document.getElementById('gitRepo').value = "";
                
                btnDeploy.style.display = 'none';
                btnGenerate.style.display = 'flex';
                btnDownload.style.display = 'none';
            }
        }


        function logStatus(msg, isError = false) {
            const logEl = document.getElementById('statusLog');
            logEl.style.color = isError ? '#ef4444' : 'var(--accent-1)';
            logEl.innerText = msg;
        }

        function utoa(data) {
            return btoa(unescape(encodeURIComponent(data)));
        }

        function redirectToTokenGenerator() {
            const repoName = document.getElementById('gitRepo').value.trim() || 'unblocked-app';
            const description = encodeURIComponent(`${repoName}`);
            const url = `https://github.com/settings/tokens/new?description=${description}&scopes=repo#:~:text=Generate%20token`;
            window.open(url, '_blank');
        }

        function generateSVGString(user, repo, filename) {
            user = user || '{user_name}';
            repo = repo || '{repo_name}';
            filename = filename || 'index';

            const url = `https://raw.githubusercontent.com/${user}/${repo}/refs/heads/main/${filename}.html`;

            return `<svg width="1366" height="768" viewBox="0 0 1366 768" xmlns="http://www.w3.org/2000/svg" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); max-width: 100%; max-height: 100%;">
    <rect width="100%" height="100%" fill="#f9f9f9" rx="10" />
    <foreignObject x="20" y="20" width="1326" height="728">
        <div xmlns="http://www.w3.org/1999/xhtml" style="width: 100%; height: 100%; display: flex; flex-direction: column; font-family: system-ui, sans-serif; box-sizing: border-box;">
            <!--Made with svg-unblocked-hosting-->
            <button onclick="
                const newWin = window.open('about:blank', '_blank');
                fetch('${url}')
                  .then(response => response.text())
                  .then(text => {
                    if (newWin) {
                      newWin.document.open();
                      newWin.document.write(text);
                      newWin.document.close();
                    }
                  });" style="flex-grow: 1; width: 100%; font-size: 32px; font-weight: bold; cursor: pointer; border: none; border-radius: 12px; background: linear-gradient(135deg, #10b981, #3b82f6); color: white; transition: 0.2s; box-shadow: 0 10px 25px rgba(0,0,0,0.2);">
                Launch
            </button>
        </div>
    </foreignObject>
</svg>`;
        }

        function displayHostedLinks(user, repo) {
            const linkTemplates = [
                `https://cdn.jsdelivr.net/gh/${user}/${repo}@main/clickopen.svg`,
                `https://esm.sh/gh/${user}/${repo}@main/clickopen.svg?dev`,
                `https://cdn.statically.io/gh/${user}/${repo}@main/clickopen.svg?v=0`,
                `https://rawcdn.githack.com/${user}/${repo}/main/clickopen.svg`,
                `https://raw.githack.com/${user}/${repo}/main/clickopen.svg?t=0`
            ];

            const listContainer = document.getElementById('linksList');
            listContainer.innerHTML = ''; 

            linkTemplates.forEach((url, index) => {
                const row = document.createElement('div');
                row.className = 'link-row';
                
                row.innerHTML = `
                    <div class="link-url" id="url-${index}">${url}</div>
                    <button class="btn-copy" onclick="copyToClipboard('url-${index}', this)">Copy</button>
                `;
                listContainer.appendChild(row);
            });

            document.getElementById('linksPanel').style.display = 'block';
        }

        function copyToClipboard(elementId, btn) {
            const text = document.getElementById(elementId).innerText;
            navigator.clipboard.writeText(text).then(() => {
                const originalText = btn.innerText;
                btn.innerText = "Copied!";
                btn.style.background = "var(--accent-1)";
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.style.background = "";
                }, 2000);
            });
        }

        function generateOnly() {
            const username = document.getElementById('gitUsername').value.trim();
            const repoName = document.getElementById('gitRepo').value.trim();
            const filename = document.getElementById('fileName').value.trim() || 'index';

            if (!username || !repoName) {
                logStatus("Error: GitHub Username and Repository Name are required.", true);
                return;
            }

            globalUsername = username;
            displayHostedLinks(username, repoName);
            
            try {
                const finalSvgContent = generateSVGString(username, repoName, filename);
                const blob = new Blob([finalSvgContent], { type: 'image/svg+xml' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = 'clickopen.svg';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                logStatus("Links generated and SVG downloaded successfully!");
            } catch (error) {
                logStatus(`Error generating SVG: ${error.message}`, true);
            }
        }

        async function downloadZip() {
            const repoName = document.getElementById('gitRepo').value.trim() || 'site-files';
            
            let username = globalUsername || '{user_name}';
            if (currentAppMode !== 'NO_REPO') {
                username = document.getElementById('gitUsername').value.trim() || '{user_name}';
            }

            const filename = currentAppMode === 'HAS_REPO_NO_HTML' ? 'index' : (document.getElementById('fileName').value.trim() || 'index');

            try {
                logStatus("Generating ZIP folder...");
                const zip = new JSZip();

                if (currentAppMode !== 'HAS_REPO_HAS_HTML') {
                    const htmlContent = document.getElementById('htmlInput').value;
                    if (!htmlContent) {
                        logStatus("Error: HTML content is empty. Please add code before downloading.", true);
                        return;
                    }
                    zip.file(`${filename}.html`, htmlContent);
                }

                const finalSvgContent = generateSVGString(username, repoName, filename);
                zip.file("clickopen.svg", finalSvgContent);

                const content = await zip.generateAsync({ type: "blob" });
                
                const link = document.createElement("a");
                link.href = URL.createObjectURL(content);
                link.download = `${repoName}-files.zip`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                logStatus("ZIP file downloaded successfully!");
            } catch (error) {
                logStatus(`Error building archive: ${error.message}`, true);
            }
        }

        async function createRepoAndDeploy() {
            const token = document.getElementById('gitToken').value.trim();
            const repoName = document.getElementById('gitRepo').value.trim();
            const htmlContent = document.getElementById('htmlInput').value;
            const filename = document.getElementById('fileName').value.trim() || 'index';
            const btn = document.getElementById('deployBtn');

            if (!token || !repoName || !htmlContent) {
                logStatus("Error: Token, Repo Name, and HTML content are required.", true);
                return;
            }

            btn.disabled = true;
            document.getElementById('linksPanel').style.display = 'none'; 

            try {
                logStatus("Authenticating with GitHub...");
                const userRes = await fetch('https://api.github.com/user', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (!userRes.ok) throw new Error("Invalid GitHub Token");
                const userData = await userRes.json();
                globalUsername = userData.login; 

                logStatus(`Creating repository '${repoName}'...`);
                const repoRes = await fetch('https://api.github.com/user/repos', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        name: repoName,
                        description: "Deployed via SVG Unblocked Hosting",
                        private: false,
                        auto_init: true 
                    })
                });

                if (!repoRes.ok && repoRes.status !== 422) {
                    throw new Error("Failed to create repository");
                }

                logStatus("Preparing files...");
                await new Promise(resolve => setTimeout(resolve, 2500));

                logStatus(`Uploading ${filename}.html...`);
                await fetch(`https://api.github.com/repos/${globalUsername}/${repoName}/contents/${filename}.html`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: `Add ${filename}.html`,
                        content: utoa(htmlContent)
                    })
                });

                logStatus("Uploading clickopen.svg...");
                const finalSvgContent = generateSVGString(globalUsername, repoName, filename);
                await fetch(`https://api.github.com/repos/${globalUsername}/${repoName}/contents/clickopen.svg`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: "Add clickopen.svg",
                        content: utoa(finalSvgContent)
                    })
                });

                logStatus(`Success! Repository created and files uploaded.`);
                displayHostedLinks(globalUsername, repoName);
                
                btn.innerHTML = "View on GitHub";
                btn.onclick = () => window.open(`https://github.com/${globalUsername}/${repoName}`, '_blank');
                btn.disabled = false;

            } catch (error) {
                logStatus(`Error: ${error.message}`, true);
                btn.disabled = false;
                btn.innerHTML = `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg> Retry Deploy`;
            }
        }
    </script>
</body>
